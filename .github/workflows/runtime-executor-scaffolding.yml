name: runtime-executor-scaffolding

on:
  pull_request:
  push:
    branches: ["main", "master", "work", "claude/**", "chatgpt/**"]

jobs:
  scaffolding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run deterministic tests
        run: |
          chmod +x scripts/test.sh
          ./scripts/test.sh

      - name: Check runtime/executor scaffolding
        run: python scripts/check_runtime_executor_scaffolding.py
