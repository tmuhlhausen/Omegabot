name: release-gate

on:
  pull_request:
  push:
    branches: ["main", "master", "work", "claude/**"]

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run release gate
        run: |
          chmod +x scripts/test.sh scripts/release_gate.sh
          ./scripts/release_gate.sh

      - name: Verify implementation matrix gate (defensive)
        run: python scripts/check_implementation_matrix.py
